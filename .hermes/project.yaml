directive: 'Build a web tool: What time''s Throw in?


  Ireland is a nation of sports crazy fans. There are numerous different types of
  sport available to watch on TV - rugby, soccer, golf, GAA, horse racing. It is difficult
  to collate all these different sport start times and the television channel (or
  more recently - streaming service) they are available on. The key times are weekend.
  Build a website that shows the start times and the channel for the top sports.


  Requirements:

  - Single-page web tool, self-contained HTML/CSS/JS

  - No external database or auth required

  - Must work as a static file served at a path URL

  - Include clear usage instructions on the page'
